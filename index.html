    <!-- TAREFA 3: Adscala Rastreamento de Conversão -->
    <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var ct = params.get('ct');
      if (ct) {
        localStorage.setItem('adscala_ct', ct);
        localStorage.setItem('multiads_ct', ct);
      }

      function sendConversion(pedidoId, valor) {
        var code = localStorage.getItem('adscala_ct') || localStorage.getItem('multiads_ct');
        if (!code) return;
        fetch('https://adscala.com.br/api/webhook/venda', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trackingCode: code, pedidoId: pedidoId || Date.now(), valor: valor || 0 })
        });
      }

      window.adscala_sendConversion = sendConversion;
      window.multiads_sendConversion = sendConversion;
    })();
    </script>
    <!-- Fim Adscala Rastreamento de Conversão -->

    <!-- TAREFA 4: Adscala Tracking Pixel — só ativo na landing /trial -->
    <script>
    (function(){
      if(location.pathname !== '/trial' && !location.pathname.startsWith('/trial?')) return;
      var mid="CT-USER-001-ADMIN";
      var api="https://adscala.com.br/api/tracking";
      function send(e,d){
        fetch(api,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({event:e,nodeId:mid,url:location.href,...d})}).catch(function(){});
      }
      send("pageview",{});
      document.addEventListener("click",function(e){
        var t=e.target.closest("a,button,[data-track]");
        if(t)send("click",{element:t.tagName,text:(t.innerText||"").slice(0,80)});
      });
      window.addEventListener("scroll",function(){
        var pct=Math.round(window.scrollY/(document.body.scrollHeight-window.innerHeight)*100);
        if(pct===25||pct===50||pct===75||pct===100)send("scroll",{depth:pct+"%"});
      },{passive:true});
    })();
    </script>
    <!-- Fim Adscala Tracking Pixel -->
