<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d2b1a" />
    <meta name="description" content="Procedimentos e sinais de apostas esportivas em tempo real" />
    <meta name="application-name" content="Shark Green App" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shark Green" />
    <link rel="apple-touch-icon" sizes="192x192" href="/app/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/app/icons/icon-512.png" />
    <link rel="manifest" href="/app/manifest.json" />
    <title>Shark Green</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // Registra o Service Worker e detecta troca para recarregar automaticamente.
      // Roda como script classico (nao-module) — funciona mesmo quando os
      // modulos JS falham (cache corrompido do SW antigo).
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/app/sw.js', { scope: '/app/' });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
